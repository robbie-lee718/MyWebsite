<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="stylesheet" href="global.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="#" id="nav-brand" class="brand">Portfolio</a>
      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#experience">Experience</a></li>
      </ul>
    </div>
  </nav>

  <header id="about" class="hero section">
    <div class="container">
      <h1 id="hero-name">Loading...</h1>
      <p id="hero-title" class="subtitle"></p>
      <p id="hero-bio" class="bio"></p>
      <div id="hero-socials" class="social-links"></div>
    </div>
  </header>

  <section id="skills" class="section alt-bg">
    <div class="container">
      <h2>Technical Skills</h2>
      <div id="skills-grid" class="skills-grid"></div>
    </div>
  </section>

  <section id="projects" class="section">
    <div class="container">
      <h2>Featured Projects</h2>
      <div id="projects-grid" class="projects-grid"></div>
    </div>
  </section>

  <section id="experience" class="section alt-bg">
    <div class="container">
      <h2>Experience</h2>
      <div id="experience-timeline" class="timeline"></div>
    </div>
  </section>

  <footer>
    <div class="container text-center">
      <p>&copy; <span id="footer-year"></span> <span id="footer-name"></span>. Built with HTML, CSS, and JS</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
